<!DOCTYPE html>
<html>
<head>
    <title>Stroke Prediction AI Agent</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <!-- Brain Image -->
    <img src="{{ url_for('static', filename='images/brain.png') }}"
         alt="Brain"
         class="brain-image">

    <h1>🧠 Stroke Prediction AI Agent</h1>

    <form action="/predict" method="POST">

        <label>Gender</label>
        <select name="gender">
            <option value="1">Male</option>
            <option value="0">Female</option>
        </select>

        <label>Age</label>
        <input type="number" name="age" step="0.1" required>

        <label>Hypertension</label>
        <select name="hypertension">
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>

        <label>Heart Disease</label>
        <select name="heart_disease">
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>

        <label>Ever Married</label>
        <select name="ever_married">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Work Type</label>
        <select name="work_type">
            <option value="2">Private</option>
            <option value="3">Self-employed</option>
            <option value="0">Govt Job</option>
            <option value="1">Children</option>
            <option value="4">Never Worked</option>
        </select>

        <label>Residence Type</label>
        <select name="residence_type">
            <option value="1">Urban</option>
            <option value="0">Rural</option>
        </select>

        <label>Average Glucose Level</label>
        <input type="number" name="avg_glucose_level" step="0.01" required>

        <label>BMI</label>
        <input type="number" name="bmi" step="0.1" required>

        <label>Smoking Status</label>
        <select name="smoking_status">
            <option value="1">Formerly Smoked</option>
            <option value="2">Never Smoked</option>
            <option value="3">Smokes</option>
            <option value="0">Unknown</option>
        </select>

        <br><br>

        <button type="submit" class="predict-btn">
            🔍 Predict Stroke Risk
        </button>

        <br><br>

        <a href="/history">
            <button type="button" class="history-btn">
                📋 View Patient History
            </button>
        </a>

    </form>

    {% if prediction %}

    <div class="result">

        <h2>Prediction : {{ prediction }}</h2>

        <h3>Risk Level : {{ risk }}</h3>

        <h3>Probability : {{ probability }}%</h3>

        <p>{{ advice }}</p>

    </div>

    {% endif %}

</div>

</body>
</html>

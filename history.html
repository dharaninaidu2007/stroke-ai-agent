<!DOCTYPE html>
<html>
<head>
    <title>Patient History</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        th,td{
            border:1px solid #ccc;
            padding:12px;
            text-align:center;
        }

        th{
            background:#007bff;
            color:white;
        }

        h1{
            text-align:center;
        }

        .container{
            width:90%;
            margin:auto;
            margin-top:40px;
        }

        a{
            text-decoration:none;
            background:#28a745;
            color:white;
            padding:10px 20px;
            border-radius:8px;
        }

        a:hover{
            background:#218838;
        }
    </style>

</head>

<body>

<div class="container">

<h1>🩺 Patient History</h1>

<a href="/">⬅ Back</a>

<table>

<tr>
<th>Date</th>
<th>Age</th>
<th>Prediction</th>
<th>Risk</th>
<th>Probability (%)</th>
</tr>

{% for row in history %}

<tr>

<td>{{row.Date}}</td>
<td>{{row.Age}}</td>
<td>{{row.Prediction}}</td>
<td>{{row.Risk}}</td>
<td>{{row.Probability}}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
